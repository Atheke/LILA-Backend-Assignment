# Render Blueprint (https://render.com/docs/blueprint-spec)
# Apply from the repository root. Build Nakama modules before the image build
# (e.g. CI: cd nakama && npm ci && npm run build).

databases:
  - name: nakama-postgres
    databaseName: nakama
    user: nakama

services:
  - type: web
    name: nakama
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /healthcheck
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nakama-postgres
          property: connectionString

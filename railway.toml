# Railway: https://docs.railway.com/guides/config-as-code
# Link a Postgres plugin to this service so DATABASE_URL is injected.
# Set NAKAMA_SOCKET_SERVER_KEY (and other secrets) in the service variables UI.

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
